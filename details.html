    import { db } from "./firebase.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
const params = new URLSearchParams(window.location.search);

let coach;

const id = params.get("id");

if (id) {
    const coachRef = doc(db, "coaches", id);
    const coachSnap = await getDoc(coachRef);

    if (coachSnap.exists()) {
        coach = coachSnap.data();
        coach.img = coach.imageUrl;
        coach.price = coach.price + " EGP / Session";
        coach.sport = coach.specialization;
        coach.certs = coach.certs || [];
        coach.trainingPlaces = coach.trainingPlaces || [];
    }
} else {
    const name = params.get("name");
    coach = data[name];
}
if (!coach) {
    document.body.innerHTML = "<h2>Coach not found</h2>";
    throw new Error("No coach found");
}
document.getElementById("name").textContent = coach.name || coach.fullName;
document.getElementById("sport").textContent = coach.sport;
document.getElementById("img").src = coach.img;
document.getElementById("area").textContent = coach.area;
document.getElementById("phone").textContent = coach.phone;
document.getElementById("price").textContent = coach.price;
document.getElementById("about").textContent = coach.about;
const ul = document.getElementById("certs");
coach.certs.forEach(cert => {
const li = document.createElement("li");
li.textContent = cert;
ul.appendChild(li);
});
const placesDiv = document.getElementById("places");

coach.trainingPlaces.forEach(imgUrl => {
    const img = document.createElement("img");
    img.src = imgUrl;
    img.style.width = "150px";
    img.style.margin = "10px";
    img.style.borderRadius = "10px";

    placesDiv.appendChild(img);
});
