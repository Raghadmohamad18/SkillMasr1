<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Registration</title>

<style>
body{
    background-color: #888888;
}
.form-box{
    background:white;
    width:90%;
    max-width:600px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#333;
}

input, select, textarea{
    width:90%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:90%;
    padding:12px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#388E3C;
}

label{
    font-weight:bold;
}

    .contact-section {
        background: rgb(87, 84, 84);
        color: white;
        padding: 30px;
        border-radius: 15px;
        margin: 30px 0;
    }
        
    .contact-section h2 {
        border-bottom: 3px solid #C62828;
        display: inline-block;
        padding-bottom: 10px;
    }
        
    .contact-section a {
        color: #64B5F6;
        text-decoration: underline;
    }
        
    footer {
        margin-top: 40px;
        text-align: center;
        background: rgb(87, 84, 84);
        color: white;
        padding: 20px;
        border-top: 3px solid #C62828;
    }

</style>
</head>

<body>
<center>
<div class="form-box">

<h2>Coach Registration Form</h2>

<form id="coachForm">

<label>Full Name</label>
<input type="text" id="fullName" placeholder="Enter your full name" required>
<label>Email</label>
<input type="email" id="email" placeholder="Enter your email" required>

    <label>Sport / Skill</label>

<select id="category" onchange="toggleOtherCategory()" required>
    <option value="">Select Category</option>
    <option value="Sports">Sports</option>
    <option value="Handmade">Handmade</option>
    <option value="Music">Music</option>
    <option value="Programming">Programming</option>
    <option value="Other">Other</option>
</select>

<div id="otherCategoryDiv" style="display:none;">
    <label>Write your category</label>
    <input type="text" id="otherCategory" placeholder="Example: Photography">
</div>
    
<label>Governorate</label>

<select id="governorate" required>
    <option value="">Select Governorate</option>

<option>Alexandria</option>
<option>Aswan</option>
<option>Asyut</option>
<option>Beheira</option>
<option>Beni Suef</option>
<option>Cairo</option>
<option>Dakahlia</option>
<option>Damietta</option>
<option>Fayoum</option>
<option>Gharbia</option>
<option>Giza</option>
<option>Ismailia</option>
<option>Kafr El Sheikh</option>
<option>Luxor</option>
<option>Matrouh</option>
<option>Minya</option>
<option>Monufia</option>
<option>New Valley</option>
<option>North Sinai</option>
<option>Port Said</option>
<option>Qalyubia</option>
<option>Qena</option>
<option>Red Sea</option>
<option>Sharqia</option>
<option>Sohag</option>
<option>South Sinai</option>
<option>Suez</option>

</select>

<label>Area</label>
<input type="text" id="area" placeholder="Smouha">

<label>Phone Number</label>
<input type="tel" id="phone" placeholder="01XXXXXXXXX">

<label>password</label>
<input type="password" id="password">

<label>Training Price</label>
<input type="number" id="price" placeholder="Price in EGP">

<label>About You</label>
<textarea id="about" placeholder="Tell us about yourself"></textarea>

<label>Upload Your Photo</label>
<input type="file" accept="image/*">

<label>Upload Certificates Photos</label>
<input type="file" accept="image/*" multiple>

<label>Upload Training Place Photos</label>
<input type="file" accept="image/*" multiple>

<button type="submit">
Register
</button>
</form>
</div>
</center>
    <section id="contact" class="contact-section">
            <h2 id="contact-title">Contact Us</h2>
            <p>📱 <span id="phone">phone no.:+20**********</span></p>
            <p>💬 <span id="whatsapp">whatsapp: <a href="https://wa.me/20**********">click here</a></span></p>
            <p>📧 <span id="email">email: Skillmasr@gmail.com</span></p>
    </section>

    <footer>
             <p id="footer-text">© 2026 SkillMasr - All Rights Reserved</p>
    </footer>
    <script type="module" src="firebase.js"></script>
    <script type="module">
import { db, auth } from "./firebase.js";

import {
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import {
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const form = document.getElementById("coachForm");

form.addEventListener("submit", async function (e) {

    e.preventDefault();

    const fullName = document.getElementById("fullName").value;
    const email = document.getElementById("email").value;

    let category = document.getElementById("category").value;
    const otherCategory = document.getElementById("otherCategory").value;

    if (category == "Other") {
        category = otherCategory;
    }

    const sport = document.getElementById("sport").value;
    const governorate = document.getElementById("governorate").value;
    const area = document.getElementById("area").value;
    const phone = document.getElementById("phone").value;
    const password = document.getElementById("password").value;
    const price = document.getElementById("price").value;
    const about = document.getElementById("about").value;

    try {

        if (fullName == "") {
            alert("Enter name");
            return;
        }

        if (password.length < 6) {
            alert("Password must be at least 6 characters");
            return;
        }

        if (phone.length != 11) {
            alert("Phone must be 11 digits");
            return;
        }

        if (price <= 0) {
            alert("Invalid price");
            return;
        }

        await addDoc(collection(db, "coaches"), {
            fullName,
            email,
            sport,
            category,
            governorate,
            area,
            phone,
            price,
            about
        });

        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        localStorage.setItem("loggedIn", "true");

        alert("تم حفظ البيانات بنجاح ✅");

        window.location.href = "index.html";

    } catch (error) {
        alert(error.message);
    }

});
    </script>
    
    <script>
function toggleOtherCategory() {

    const category = document.getElementById("category").value;
    const div = document.getElementById("otherCategoryDiv");

    if (category === "Other") {
        div.style.display = "block";
    } else {
        div.style.display = "none";
    }

}
</script>
</body>
</html>
