<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <style>
        body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.page{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px;
}

.welcome{
    background:#1F1F1F;
    color:white;
    width:100%;
    max-width:600px;
    padding:30px;
    border-radius:15px;
    text-align:center;
    margin-bottom:25px;
}

.welcome h1{
    margin:0;
    color:#D4AF37;
}

.welcome h3{
    margin-top:10px;
    font-weight:normal;
}

.form{
    background:white;
    width:100%;
    max-width:600px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

label{
    display:block;
    text-align:left;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#C62828;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#388E3C;
}

.sign{
    margin-top:20px;
    text-align:center;
}

.sign p{
    color:#444;
    margin-bottom:8px;
}

.sign a{
    color:#D4AF37;
    text-decoration:none;
    font-weight:bold;
}

.sign a:hover{
    text-decoration:underline;
}

.contact-section{
    width:100%;
    max-width:600px;
    margin:40px auto;
    background:#1F1F1F;
    color:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

.contact-section h2{
    color:#D4AF37;
    margin-bottom:20px;
}

.contact-section p{
    margin:12px 0;
}

.contact-section a{
    color:#D4AF37;
}
    </style>
</head>
<body>
    <div class="page">
        <div class="welcome">
            <h1>Log in page.</h1>
            <h3><em>Let us remember you.</em></h3>
        </div>
        <div class="form">
            <form id="loginForm">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>

                <label>password</label>
                <input type="password" id="password" placeholder="Enter your password" required>

                <button type="submit">Log in</button>
            </form>
        </div>
        <div class="sign">
            <p>You don't have an account</p>
            <a href="sign.html"><em>Sign up</em></a>
        </div>
</div>

    <section id="contact" class="contact-section">
            <h2 id="contact-title">Contact Us</h2>
            <p>📱 <span id="phone">phone no.:+201100351797</span></p>
            <p>💬 <span id="whatsapp">whatsapp: <a href="https://wa.me/201100351797">click here</a></span></p>
            <p>📧<span id="contact-email">email: Skillmasr@gmail.com</span></p>
    </section>

           <script type="module">
import { auth } from "./firebase.js";

import {
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {

        await signInWithEmailAndPassword(auth, email, password);

        alert("Login successful!");

        window.location.href = "SkillMasr.html";

    } catch (error) {

        alert("Invalid email or password");

    }

});
</script>
</body>
</html>
