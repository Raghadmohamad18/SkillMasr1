<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <style>
        .welcome{
           height:auto;
            width:90%;
            background-color:#000000;
        }
        button{
    height: 50px;
    width: 90px;
    background-color:#C62828;
    border-radius: 20%;
    color:white;
}
        
        button:hover{
            background:#388E3C;
        }
        a{
            color: blue;
            text-decoration: underline;
        }
        .form{
            display:flex;
            flex-direction:column;
            background:#000000;
            width:90%;
            max-width:600px;
            padding:25px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }
        input{
            border-radius: 5px;
        }
         .contact-section{
            background:#000000;
            color:white;
            padding:30px;
            border-radius:15px;
            margin:30px auto;
            width:90%;
            max-width:600px;
            text-align:center;
        }
        
        .contact-section h2{
            border-bottom:3px solid #C62828;
            display:inline-block;
            padding-bottom:10px;
        }
        
        footer{
            margin-top:40px;
            text-align:center;
            background:#000000;
            color:white;
            padding:20px;
            border-top:3px solid #C62828;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="welcome">
            <h1>Log in page.</h1>
            <h3><em>Let us remember you.</em></h3>
        </div>
        <div class="form">
            <form id="loginForm">
                <label>Phone number</label>
                <input type="tel"placeholder="01XXXXXXXXX" required><br><br>

                <label>password</label>
                <input type="password" required><br><br>

                <button type="submit">Log in</button>
            </form>
        </div>
        <div class="sign">
            <p>You don't have an account</p>
            <a href="sign.html"><em>Sign up</em></a>
        </div>
</div>

    <section id="contact" class="contact-section">
            <h2 id="contact-title">Contact Us</h2>
            <p>📱 <span id="phone">phone no.:+201100351797</span></p>
            <p>💬 <span id="whatsapp">whatsapp: <a href="https://wa.me/201100351797">click here</a></span></p>
            <p>📧 <span id="email">email: Skillmasr@gmail.com</span></p>
    </section>

    <footer>
             <p id="footer-text">© 2026 SkillMasr - All Rights Reserved</p>
    </footer>
    <script>
            document.getElementById("loginForm").addEventListener("submit", function(e){
                e.preventDefault();
            
                localStorage.setItem("loggedIn", "true");
            
                const coach = localStorage.getItem("coachName");
            
                if(coach){
                    window.location.href = "details.html?name=" + encodeURIComponent(coach);
                }else{
                    window.location.href = "SkillMasr.html";
                }
            });
    </script>
</body>
</html>
