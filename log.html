<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <style>
        body{
    background:#F5F5F5;
    font-family:Arial,sans-serif;
    margin:0;
}
      .welcome{
    background:#1F1F1F;
    color:white;
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:600px;
    margin:30px auto;
}
        .page{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}
        button{
    height: 50px;
    width: 90px;
    background-color:#C62828;
    border-radius: 20%;
    color:white;
}
        
        button:hover{
            background:#388E3C;
        }
        a{
            color: #D4AF37;
            text-decoration: underline;
        }
        .form{
    background:white;
    color:#1F1F1F;
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:600px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}
        input{
            border-radius: 5px;
        }
         .contact-section{
            background:#000000;
            color:white;
            padding:30px;
            border-radius:15px;
            margin:30px auto;
            width:90%;
            max-width:600px;
            text-align:center;
        }
        
        .contact-section h2{
            border-bottom:3px solid #C62828;
            display:inline-block;
            padding-bottom:10px;
        }
        .contact-section a{
        color:#D4AF37;
       }
    </style>
</head>
<body>
    <div class="page">
        <div class="welcome">
            <h1>Log in page.</h1>
            <h3><em>Let us remember you.</em></h3>
        </div>
        <div class="form">
            <form id="loginForm">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>

                <label>password</label>
                <input type="password" id="password" placeholder="Enter your password" required>

                <button type="submit">Log in</button>
            </form>
        </div>
        <div class="sign">
            <p>You don't have an account</p>
            <a href="sign.html"><em>Sign up</em></a>
        </div>
</div>

    <section id="contact" class="contact-section">
            <h2 id="contact-title">Contact Us</h2>
            <p>📱 <span id="phone">phone no.:+201100351797</span></p>
            <p>💬 <span id="whatsapp">whatsapp: <a href="https://wa.me/201100351797">click here</a></span></p>
            <p>📧 <span id="email">email: Skillmasr@gmail.com</span></p>
    </section>

    <script>
           <script type="module">
import { auth } from "./firebase.js";

import {
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {

        await signInWithEmailAndPassword(auth, email, password);

        alert("Login successful!");

        window.location.href = "SkillMasr.html";

    } catch (error) {

        alert("Invalid email or password");

    }

});
</script>
    </script>
</body>
</html>
